<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">

  <div class="login-card">
    <h2>Welcome Back 👋</h2>
    <p>Login to continue shopping</p>

    <!-- ❌ Error Message -->
    <p id="errorMsg" class="error"></p>

    <!-- Tabs -->
    <div class="tabs">
      <button id="emailTab" onclick="showEmail()">Email</button>
      <button id="phoneTab" onclick="showPhone()">Phone</button>
    </div>

    <!-- EMAIL LOGIN -->
    <div id="emailLogin">

      <!-- ✨ EMAIL INPUT (FLOATING LABEL) -->
      <div class="input-box">
        <input type="email" id="email" placeholder=" " required>
        <label>Email</label>
      </div>

      <!-- ✨ PASSWORD INPUT (FLOATING LABEL) -->
      <div class="input-box password-box">
        <input type="password" id="password" placeholder=" " required>
        <label>Password</label>
        <span onclick="togglePassword()">👁️</span>
      </div>

      <!-- 🔐 FORGOT PASSWORD -->
      <p class="forgot" onclick="resetPassword()">Forgot Password?</p>

      <!-- BUTTONS -->
      <div class="btn-group">
        <button onclick="signup()">Signup</button>
        <button onclick="login()">Login</button>
      </div>
    </div>

    <!-- PHONE LOGIN -->
    <div id="phoneLogin" style="display:none;">

      <div class="input-box">
        <input type="text" id="phone" placeholder=" " required>
        <label>+91XXXXXXXXXX</label>
      </div>

      <!-- reCAPTCHA -->
      <div id="recaptcha-container"></div>

      <button onclick="sendOTP()">Send OTP</button>

      <div class="input-box">
        <input type="text" id="otp" placeholder=" " required>
        <label>Enter OTP</label>
      </div>

      <button onclick="verifyOTP()">Verify OTP</button>
    </div>

  </div>

</div>

<!-- 🔄 LOADER -->
<div id="loader" class="loader"></div>

<!-- Firebase Auth -->
<script type="module" src="js/auth.js"></script>

<!-- UI Scripts -->
<script>

// 👁️ Toggle Password
function togglePassword() {
  const pass = document.getElementById("password");
  pass.type = (pass.type === "password") ? "text" : "password";
}

// ❌ Show Error Message
function showError(msg) {
  document.getElementById("errorMsg").innerText = msg;
}

// 🔄 Loader Functions
function showLoader() {
  document.getElementById("loader").style.display = "flex";
}

function hideLoader() {
  document.getElementById("loader").style.display = "none";
}

// 🔁 Show Email Login
function showEmail() {
  const email = document.getElementById("emailLogin");
  const phone = document.getElementById("phoneLogin");

  email.style.display = "block";
  phone.style.display = "none";

  document.getElementById("emailTab").classList.add("active");
  document.getElementById("phoneTab").classList.remove("active");
}

// 🔁 Show Phone Login
function showPhone() {
  const email = document.getElementById("emailLogin");
  const phone = document.getElementById("phoneLogin");

  email.style.display = "none";
  phone.style.display = "block";

  document.getElementById("phoneTab").classList.add("active");
  document.getElementById("emailTab").classList.remove("active");
}

// ✅ Default tab
window.addEventListener("DOMContentLoaded", () => {
  showEmail();
});

</script>

</body>
</html>
